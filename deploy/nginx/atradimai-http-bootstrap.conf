# Temporary HTTP configuration used only to obtain the first Let's Encrypt
# certificate. Replace this with atradimai.conf after Certbot succeeds.
server {
    listen 80;
    listen [::]:80;
    server_name atradimai.lt www.atradimai.lt;

    root /var/www/atradimai/current;
    location ^~ /.well-known/acme-challenge/ { try_files $uri =404; }
    location / { return 503; }
}
