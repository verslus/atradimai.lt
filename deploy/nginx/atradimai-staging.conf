# Private staging endpoint. This listens only on localhost and does not expose
# the site publicly. Use SSH port forwarding or curl on the server to test it.
server {
    listen 127.0.0.1:8081 default_server;
    server_name atradimai-staging.local;

    root /var/www/atradimai/current;
    index index.html;
    client_max_body_size 5m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ~* /(?:\.git|\.env|\.sql|wp-config\.php|wp-docs|data|private-data)(?:/|$) { return 404; }
    location ~ /\. { deny all; }
    include /etc/nginx/snippets/atradimai-legacy-redirects.conf;

    location = /send-form.php { include fastcgi_params; fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name; fastcgi_pass unix:/run/php/php8.3-fpm.sock; }
    location = /payment.php { include fastcgi_params; fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name; fastcgi_pass unix:/run/php/php8.3-fpm.sock; }
    location ~ \.php$ { return 404; }
    location / { try_files $uri $uri/ $uri.html =404; }
    error_page 404 /404.html;
}
